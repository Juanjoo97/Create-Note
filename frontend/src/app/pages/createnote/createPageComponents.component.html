<div class="flex justify-center items-center min-h-screen w-screen py-8 px-4">
  <div #modal></div>
  <div class="w-full sm:w-4/5 md:w-2/3 lg:w-2/5 xl:w-1/3 bg-white border border-gray-200 rounded-xl shadow-sm">

    <div class="px-6 pt-6 pb-4 border-b border-gray-100">
      <h1 class="text-lg font-semibold text-gray-900 tracking-tight">My Notes</h1>
    </div>

    <div class="px-6 py-5">
      <form [formGroup]="noteForm" (ngSubmit)="enviarFormulario($event)">
        <div class="mb-4">
          <label for="title" class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Title</label>
          <textarea id="title"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg resize-none h-16 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-900 focus:ring-1 focus:ring-gray-900 focus:outline-none transition-colors"
            formControlName="title" [class.border-red-300]="noteForm.get('title')?.invalid && noteForm.get('title')?.touched"
            placeholder="Note title"></textarea>
        </div>
        <div class="mb-5">
          <label for="content" class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Content</label>
          <textarea id="content"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg resize-none h-16 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-900 focus:ring-1 focus:ring-gray-900 focus:outline-none transition-colors"
            formControlName="content" [class.border-red-300]="noteForm.get('content')?.invalid && noteForm.get('content')?.touched"
            placeholder="Note content"></textarea>
        </div>
        <button type="submit"
          class="w-full py-2 px-4 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed transition-colors"
          [disabled]="!noteForm.valid">Add note</button>
      </form>
    </div>

    <div class="px-6 max-h-72 overflow-y-auto">
      <ng-container *ngIf="!isLoading; else loadingTemplate">
        <div *ngIf="notes.length > 0; else noDataTemplate" class="flex flex-row justify-between border-b border-gray-100 pb-2 mb-3">
          <div class="w-6"></div>
          <div class="w-full sm:w-1/3 text-center flex items-center justify-center space-x-1">
            <span class="text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-900 transition-colors" (click)="sortNotes('title')">Title</span>
            <svg *ngIf="sortOrderTitle === 'desc'" width="14px" height="14px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path fill="none" stroke="#9ca3af" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M14 10H2m8 4H2m4 4H2M18 6H2m17 4v10m0 0l3-3m-3 3l-3-3" />
            </svg>
            <svg *ngIf="sortOrderTitle === 'asc'" width="14px" height="14px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path fill="none" stroke="#9ca3af" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M14 14H2m8-4H2m4-4H2m16 12H2m17-4V4m0 0l3 3m-3-3l-3 3" />
            </svg>
          </div>
          <div class="w-full sm:w-1/3 text-center flex items-center justify-center space-x-1">
            <span class="text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-900 transition-colors" (click)="sortNotes('content')">Content</span>
            <svg *ngIf="sortOrderContent === 'desc'" width="14px" height="14px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path fill="none" stroke="#9ca3af" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M14 10H2m8 4H2m4 4H2M18 6H2m17 4v10m0 0l3-3m-3 3l-3-3" />
            </svg>
            <svg *ngIf="sortOrderContent === 'asc'" width="14px" height="14px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path fill="none" stroke="#9ca3af" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M14 14H2m8-4H2m4-4H2m16 12H2m17-4V4m0 0l3 3m-3-3l-3 3" />
            </svg>
          </div>
          <div class="w-full sm:w-1/3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</div>
        </div>
        <ol>
          <li *ngFor="let note of notesSort; let i = index"
            class="flex flex-row sm:flex-row sm:justify-between items-center py-2 border-b border-gray-50 last:border-0">
            <div class="w-6 text-center text-xs text-gray-400 font-medium">{{ i + 1 }}</div>
            <div class="w-full sm:w-1/3 text-center text-sm text-gray-700 break-words px-3 overflow-hidden overflow-ellipsis">
              {{ note.title }}
            </div>
            <div class="w-full sm:w-1/3 text-center text-sm text-gray-500 break-words px-3 overflow-hidden overflow-ellipsis">
              {{ note.content }}
            </div>
            <div class="w-full sm:w-1/3 flex justify-center space-x-3">
              <mat-icon class="cursor-pointer text-gray-400 hover:text-gray-900 transition-colors text-base" (click)="eliminarNota(note.id)">delete_outline</mat-icon>
              <mat-icon class="cursor-pointer text-gray-400 hover:text-gray-900 transition-colors text-base" (click)="abrirFormularioEdicion(note)">edit</mat-icon>
              <mat-icon class="cursor-pointer text-gray-400 hover:text-gray-900 transition-colors text-base" (click)="archivarNota(note.id)">archive</mat-icon>
            </div>
          </li>
        </ol>
      </ng-container>

      <ng-template #loadingTemplate>
        <div class="flex flex-col items-center justify-center text-center py-8">
          <div class="w-6 h-6 border-2 border-gray-200 border-t-gray-900 rounded-full animate-spin mb-3"></div>
          <p class="text-sm text-gray-400">Loading...</p>
        </div>
      </ng-template>

      <ng-template #noDataTemplate>
        <div class="text-center py-8">
          <p class="text-sm text-gray-400">No notes yet.</p>
        </div>
      </ng-template>
    </div>

    <div class="px-6 py-4 border-t border-gray-100">
      <a routerLink="/archiveNote" class="text-sm text-gray-400 hover:text-gray-900 transition-colors">Archived notes</a>
    </div>

  </div>
</div>
