<!-- Confirm delete / action modal -->
<div *ngIf="type=='1'"
    class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-black/20">
    <div class="relative w-full max-w-sm bg-white rounded-xl shadow-lg border border-gray-200">
        <button type="button" (click)="closeMe()"
            class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 transition-colors p-1 rounded-lg">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd"></path>
            </svg>
        </button>
        <div class="p-6 text-center">
            <p class="text-sm font-medium text-gray-900 mb-6">{{title}}</p>
            <div class="flex justify-center space-x-3">
                <button
                    class="px-5 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors"
                    (click)="confirm()">Yes</button>
                <button
                    class="px-5 py-2 bg-white text-gray-700 text-sm font-medium rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors"
                    (click)="closeMe()">No</button>
            </div>
        </div>
    </div>
</div>

<!-- Success modal -->
<div *ngIf="type=='2'"
    class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-black/20">
    <div class="relative w-full max-w-sm bg-white rounded-xl shadow-lg border border-gray-200">
        <div class="p-6 text-center">
            <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <p class="text-sm font-medium text-gray-900 mb-6">{{title}}</p>
            <button
                class="px-5 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors"
                (click)="closeMe()">Ok</button>
        </div>
    </div>
</div>

<!-- Edit modal -->
<div *ngIf="type=='3'"
    class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-black/20">
    <div class="relative w-full max-w-lg bg-white rounded-xl shadow-lg border border-gray-200">
        <button type="button" (click)="closeMe()"
            class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 transition-colors p-1 rounded-lg">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd"></path>
            </svg>
        </button>
        <div class="px-6 pt-6 pb-4 border-b border-gray-100">
            <h2 class="text-base font-semibold text-gray-900">{{title}}</h2>
        </div>
        <div class="p-6">
            <form [formGroup]="noteFormEdit">
                <div class="mb-4">
                    <label for="title" class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Title</label>
                    <textarea id="title"
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg resize-none min-h-[100px] text-sm text-gray-900 placeholder-gray-400 focus:border-gray-900 focus:ring-1 focus:ring-gray-900 focus:outline-none transition-colors"
                        formControlName="title" placeholder="Note title"></textarea>
                </div>
                <div class="mb-5">
                    <label for="content" class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Content</label>
                    <textarea id="content"
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg resize-none min-h-[100px] text-sm text-gray-900 placeholder-gray-400 focus:border-gray-900 focus:ring-1 focus:ring-gray-900 focus:outline-none transition-colors"
                        formControlName="content" placeholder="Note content"></textarea>
                </div>
                <button type="submit"
                    class="w-full py-2 px-4 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed transition-colors"
                    [disabled]="!noteFormEdit.valid" (click)="confirmEdit()">Save changes</button>
            </form>
        </div>
    </div>
</div>

<!-- Warning / error modal -->
<div *ngIf="type=='4'"
    class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-black/20">
    <div class="relative w-full max-w-sm bg-white rounded-xl shadow-lg border border-gray-200">
        <div class="p-6 text-center">
            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-5 h-5 text-gray-700" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.20164 18.4695L10.1643 4.00506C10.9021 2.66498 13.0979 2.66498 13.8357 4.00506L21.7984 18.4695C22.4443 19.6428 21.4598 21 19.9627 21H4.0373C2.54022 21 1.55571 19.6428 2.20164 18.4695Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M12 9V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M12 17.0195V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <p class="text-sm font-medium text-gray-900 mb-6">{{title}}</p>
            <button
                class="px-5 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors"
                (click)="closeMe()">OK</button>
        </div>
    </div>
</div>
